<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Heena ❤️</title>
<style>
  body { 
    margin: 0; 
    padding: 0; 
    background: linear-gradient(135deg, #ffe0e0, #fdf2f2); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    height: 100vh; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    text-align: center; 
  }
  .character-container { 
    margin-bottom: 20px; 
  }
  /* Video ki styling thodi aur smooth kar di hai */
  video { 
    width: 240px; 
    height: 240px; 
    object-fit: cover; 
    border-radius: 50%; /* Gol aakar me video */
    box-shadow: 0 15px 35px rgba(225, 29, 72, 0.2); 
    border: 5px solid white;
  }
  .message { 
    font-size: 20px; 
    color: #333; 
    padding: 30px; 
    background: white; 
    border-radius: 25px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
    margin: 20px; 
    width: 85%; 
    max-width: 450px; 
  }
  h2 {
    color: #e11d48; 
    margin-top: 0;
    font-size: 26px;
  }
  /* Button me dhadkan (pulse) wala animation */
  .btn { 
    background: #ff4d4d; 
    color: white; 
    border: none; 
    padding: 15px 35px; 
    font-size: 18px; 
    border-radius: 40px; 
    cursor: pointer; 
    box-shadow: 0 8px 20px rgba(255, 77, 77, 0.4); 
    font-weight: bold; 
    margin-top: 15px; 
    transition: transform 0.2s;
    animation: pulse 2s infinite;
  }
  .btn:active {
    transform: scale(0.95);
  }
  @keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 8px 20px rgba(255, 77, 77, 0.4); }
    50% { transform: scale(1.05); box-shadow: 0 12px 25px rgba(255, 77, 77, 0.6); }
    100% { transform: scale(1); box-shadow: 0 8px 20px rgba(255, 77, 77, 0.4); }
  }
  .ending-text { 
    font-size: 16px; 
    color: #888; 
    margin-top: 25px; 
    font-style: italic; 
  }
</style>
</head>
<body>
  <div class="character-container">
    <video id="catVideo" autoplay loop muted playsinline>
      <source src="cat.mp4" type="video/mp4">
    </video>
  </div>
  
  <div class="message">
    <h2>Maaf kar dijiye madam 🥲</h2>
    <p>Maan jaaiye Heena, maaf kar do. Tumhari narazgi jayaz hai, maan jaao 🥹.</p>
  </div>
  
  <button class="btn" id="playBtn">Listen to this ❤️</button>
  
  <p class="ending-text">abhi itna hi kar paye hai maan jaaiye Heena 🥹</p>

  <audio id="myAudio" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>
  
  <script>
    const playButton = document.getElementById('playBtn');
    const audio = document.getElementById("myAudio");

    playButton.addEventListener('click', function() { 
      if (audio.paused) {
        audio.play(); 
        this.innerText = "Ab toh maan jao? 🎶 ❤️";
        this.style.animation = "none"; // Gaana chalne par animation ruk jayega
      }
    });
  </script>
</body>
</html>
